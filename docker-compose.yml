services:
  app1:
    build: .
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      INSTANCE_NAME: app1
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  app2:
    build: .
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      INSTANCE_NAME: app2
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: rate_limiter_nginx
    ports:
      - "3000:80"
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2

  postgres:
    image: postgres:17-alpine
    container_name: rate_limiter_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Naveen
      POSTGRES_DB: rateLimiter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data: